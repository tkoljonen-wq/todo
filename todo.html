<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #e8e4dc;
    --muted: #666;
    --work: #c8a96e;
    --work-dim: #3a2e1a;
    --civil: #6e9ec8;
    --civil-dim: #1a2a3a;
    --done: #3a3a3a;
    --red: #c86e6e;
    --green: #6ec88a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header .date {
    color: var(--muted);
    font-size: 12px;
  }

  /* INPUT AREA */
  .input-area {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .task-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .task-text-wrap {
    flex: 1;
    min-width: 200px;
  }

  #taskInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 0.7rem 0.9rem;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 44px;
    line-height: 1.5;
  }

  #taskInput:focus { border-color: var(--muted); }
  #taskInput::placeholder { color: var(--muted); }

  #taskInput.listening {
    border-color: var(--red);
    animation: pulse-border 1s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--red); }
    50% { border-color: #8b3030; }
  }

  .mic-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    font-size: 20px;
    padding: 0 12px;
    min-height: 44px;
    min-width: 48px;
    transition: color 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
  }

  .mic-btn:hover { color: var(--text); border-color: var(--muted); }
  .mic-btn.active { color: var(--red); border-color: var(--red); }

  .meta-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }

  .meta-row input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0.5rem 0.7rem;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  .meta-row input[type="date"]:focus { border-color: var(--muted); }
  .meta-row input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
    cursor: pointer;
  }

  /* SAVE BUTTONS */
  .save-btns {
    display: flex;
    gap: 0.6rem;
    margin-left: auto;
  }

  .btn-civil, .btn-work {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.05em;
  }

  .btn-civil {
    background: var(--civil);
    color: #0a1a2a;
  }

  .btn-work {
    background: var(--work);
    color: #1a0e00;
  }

  .btn-civil:hover, .btn-work:hover { opacity: 0.85; }
  .btn-civil:active, .btn-work:active { transform: scale(0.97); }

  /* LISTS */
  .lists-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 280px);
  }

  @media (max-width: 700px) {
    .lists-container { grid-template-columns: 1fr; }
    .save-btns { margin-left: 0; width: 100%; }
    .btn-civil, .btn-work { flex: 1; }
  }

  .list-col {
    border-right: 1px solid var(--border);
    padding: 1.5rem 2rem;
  }

  .list-col:last-child { border-right: none; }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .list-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .list-title.civil { color: var(--civil); }
  .list-title.work { color: var(--work); }

  .list-title .count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    font-style: normal;
  }

  .clear-done-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 0.3rem 0.6rem;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .clear-done-btn:hover { color: var(--red); border-color: var(--red); }

  /* TASK ITEMS */
  .task-list { display: flex; flex-direction: column; gap: 0; }

  .task-item {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    background: var(--surface);
    transition: opacity 0.2s;
    position: relative;
  }

  .task-item.civil-item { border-left: 3px solid var(--civil); }
  .task-item.work-item { border-left: 3px solid var(--work); }
  .task-item.done { opacity: 0.5; background: var(--done); }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }

  .check-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    min-width: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .task-item.done .check-btn {
    background: var(--green);
    border-color: var(--green);
    color: #0a1a0f;
  }

  .check-btn:hover { border-color: var(--green); }

  .task-text {
    flex: 1;
    line-height: 1.5;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
    margin-left: 27px;
    flex-wrap: wrap;
  }

  .task-due {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .task-due.overdue { color: var(--red); }
  .task-due.today { color: var(--work); }
  .task-due.soon { color: var(--work); }

  .task-reminders {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .delete-btn {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    background: none;
    border: none;
    color: transparent;
    cursor: pointer;
    font-size: 14px;
    transition: color 0.15s;
    padding: 2px 5px;
    line-height: 1;
  }

  .task-item:hover .delete-btn { color: var(--muted); }
  .delete-btn:hover { color: var(--red) !important; }

  /* REMINDER */
  .reminder-wrap { position: relative; }

  .reminder-trigger {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0.5rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .reminder-trigger:hover { border-color: var(--muted); }
  .reminder-trigger.has-reminders { border-color: var(--green); color: var(--green); }

  .reminder-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    min-width: 260px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .reminder-panel.open { display: block; }
  .reminder-panel h4 { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
  .reminder-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
  .reminder-item { display: flex; gap: 0.5rem; align-items: center; }
  .reminder-item select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 0.35rem 0.5rem;
    border-radius: 3px;
    outline: none;
    flex: 1;
    cursor: pointer;
  }
  .remove-reminder { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
  .remove-reminder:hover { color: var(--red); }
  .add-reminder-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 0.35rem 0.7rem;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
  }
  .add-reminder-btn:hover { border-color: var(--muted); color: var(--text); }

  .cal-btn {
    font-size: 11px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    padding: 2px 7px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cal-btn:hover { border-color: #4285f4; color: #4285f4; }

  .empty-list {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 2rem;
    border: 1px dashed var(--border);
    border-radius: 5px;
  }
</style>
</head>
<body>

<header>
  <h1>Todo</h1>
  <span class="date" id="headerDate"></span>
</header>


<div class="input-area">
  <div class="task-row">
    <div class="task-text-wrap">
      <textarea id="taskInput" rows="1" placeholder="Uusi tehtävä..."></textarea>
    </div>
    <button class="mic-btn" id="micBtn" onmousedown="startMic()" onmouseup="stopMic()" onmouseleave="stopMic()" ontouchstart="startMic(event)" ontouchend="stopMic()" ontouchcancel="stopMic()" title="Puhu tehtävä suomeksi">🎤</button>
  </div>
  <div class="meta-row">
    <input type="date" id="dueDateInput" title="Eräpäivä">
    <input type="time" id="dueTimeInput" title="Kellonaika" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:0.5rem 0.7rem;border-radius:4px;outline:none;cursor:pointer;" >

    <div class="reminder-wrap" id="reminderWrap">
      <button class="reminder-trigger" id="reminderTrigger">🔔 Muistutus</button>
      <div class="reminder-panel" id="reminderPanel">
        <h4>Muistutus kalenteriin</h4>
        <div class="reminder-list" id="reminderList"></div>
        <button class="add-reminder-btn" id="addReminderBtn">+ Lisää muistutus</button>
      </div>
    </div>
    <div class="save-btns">
      <button class="btn-civil" id="saveCivilBtn">💙 Siviili</button>
      <button class="btn-work" id="saveWorkBtn">🟡 Työ</button>
    </div>
  </div>
</div>

<div class="lists-container">
  <div class="list-col">
    <div class="list-header">
      <span class="list-title work">Työ <span class="count" id="workCount"></span></span>
      <button class="clear-done-btn" onclick="clearDone('work')">Poista valmiit</button>
    </div>
    <div class="task-list" id="workList"></div>
  </div>
  <div class="list-col">
    <div class="list-header">
      <span class="list-title civil">Siviili <span class="count" id="civilCount"></span></span>
      <button class="clear-done-btn" onclick="clearDone('civil')">Poista valmiit</button>
    </div>
    <div class="task-list" id="civilList"></div>
  </div>
</div>

<div id="toast">⚡</div>

  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'todo_v2';
let data = { civil: [], work: [] };

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) data = JSON.parse(s);
  } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── TASK INPUT AUTO-RESIZE ───────────────────────────────────────────────────
const taskInput = document.getElementById('taskInput');
taskInput.addEventListener('input', () => {
  taskInput.style.height = 'auto';
  taskInput.style.height = taskInput.scrollHeight + 'px';
});

taskInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    // don't save on Enter, just focus date
    document.getElementById('dueDateInput').focus();
  }
});

// ─── REMINDER OPTIONS ────────────────────────────────────────────────────────
const REMINDER_OPTS = [
  { value: 0,        label: 'Tapahtuman aikaan' },
  { value: 5,        label: '5 min ennen' },
  { value: 10,       label: '10 min ennen' },
  { value: 15,       label: '15 min ennen' },
  { value: 30,       label: '30 min ennen' },
  { value: 60,       label: '1 tunti ennen' },
  { value: 60*2,     label: '2 tuntia ennen' },
  { value: 60*24,    label: '1 päivä ennen' },
  { value: 60*24*2,  label: '2 päivää ennen' },
  { value: 60*24*7,  label: '1 viikko ennen' },
];

let pendingReminders = [];

document.getElementById('reminderTrigger').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('reminderPanel').classList.toggle('open');
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('reminderWrap').contains(e.target)) {
    document.getElementById('reminderPanel').classList.remove('open');
  }
});

document.getElementById('addReminderBtn').addEventListener('click', () => {
  pendingReminders.push(30);
  renderReminderInputs();
});

function renderReminderInputs() {
  const list = document.getElementById('reminderList');
  list.innerHTML = '';
  pendingReminders.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'reminder-item';
    const sel = document.createElement('select');
    REMINDER_OPTS.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.label;
      if (o.value === val) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => { pendingReminders[i] = parseInt(sel.value); });
    const rm = document.createElement('button');
    rm.className = 'remove-reminder';
    rm.textContent = '×';
    rm.addEventListener('click', () => { pendingReminders.splice(i, 1); renderReminderInputs(); });
    row.appendChild(sel);
    row.appendChild(rm);
    list.appendChild(row);
  });
  const trigger = document.getElementById('reminderTrigger');
  trigger.classList.toggle('has-reminders', pendingReminders.length > 0);
  trigger.textContent = pendingReminders.length > 0
    ? `🔔 ${pendingReminders.length} muistutus`
    : '🔔 Muistutus';
}

// ─── VOICE RECOGNITION (ostoslista-pattern: uusi olio joka kerta) ───────────
let isListening = false;

const micBtn = document.getElementById('micBtn');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function resetMicUI() {
  isListening = false;
  micBtn.classList.remove('active');
  taskInput.classList.remove('listening');
  micBtn.textContent = '🎤';
  taskInput.placeholder = 'Uusi tehtävä...';
}

function startMic(e) {
  if (e) e.preventDefault();
  if (isListening) return;
  if (!SpeechRecognition) {
    showToast('⚠️ Puheentunnistus vaatii Chrome-selaimen');
    return;
  }

  taskInput.value = '';

  const rec = new SpeechRecognition();
  rec.lang = 'fi-FI';
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = () => {
    isListening = true;
    micBtn.classList.add('active');
    taskInput.classList.add('listening');
    micBtn.textContent = '🔴';
    taskInput.placeholder = 'Kuuntelen...';
  };

  rec.onresult = (e) => {
    const teksti = Array.from(e.results).map(r => r[0].transcript).join('');
    taskInput.value = teksti;
    taskInput.style.height = 'auto';
    taskInput.style.height = taskInput.scrollHeight + 'px';
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') showToast('⚠️ Mikrofoni estetty — salli lupa osoiteriviltä');
    else if (e.error === 'no-speech') showToast('Ei puhetta havaittu, yritä uudelleen');
    else if (e.error === 'network') showToast('⚠️ Verkkovirhe — tarkista nettiyhteys');
    else showToast('Virhe: ' + e.error);
    resetMicUI();
  };

  rec.onend = () => {
    resetMicUI();
  };

  rec.start();
}

function stopMic() {
  // UI resetataan onend-callbackissa
  // Haetaan viimeisin olio DOM:in kautta ei ole tarpeen — rec on closuressa
  // Merkitään vain että halutaan lopettaa; selain lopettaa continuous=false automaattisesti
  // Mutta resetoidaan UI heti jotta nappi ei jää punaiseksi
  resetMicUI();
}

function toggleMic() {}

if (!SpeechRecognition) {
  micBtn.style.opacity = '0.3';
  micBtn.style.cursor = 'not-allowed';
}

// ─── SAVE TASK ───────────────────────────────────────────────────────────────
function getTaskInput() {
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    text: taskInput.value.trim(),
    due: document.getElementById('dueDateInput').value,
    reminders: [...pendingReminders],
    dueTime: document.getElementById('dueTimeInput').value,
    done: false,
    created: Date.now(),
  };
}

function resetForm() {
  taskInput.value = '';
  taskInput.style.height = 'auto';
  document.getElementById('dueDateInput').value = '';
  document.getElementById('dueTimeInput').value = '';
  pendingReminders = [];
  renderReminderInputs();
  document.getElementById('reminderPanel').classList.remove('open');
}

document.getElementById('saveCivilBtn').addEventListener('click', () => saveTask('civil'));
document.getElementById('saveWorkBtn').addEventListener('click', () => saveTask('work'));

function saveTask(list) {
  const task = getTaskInput();
  if (!task.text) {
    taskInput.focus();
    showToast('Kirjoita ensin tehtävä!');
    return;
  }
  data[list].unshift(task);
  save();
  render();
  resetForm();
  taskInput.focus();
  showToast(list === 'civil' ? '💙 Lisätty siviililistalle' : '🟡 Lisätty työlistalle');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function formatDue(dateStr, task) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr); due.setHours(0,0,0,0);
  const diff = Math.round((due - today) / (1000*60*60*24));
  const fi = new Intl.DateTimeFormat('fi-FI', { day:'numeric', month:'numeric', year:'numeric' });
  const label = fi.format(due) + (task && task.dueTime ? ' klo ' + task.dueTime : '');
  let cls = 'task-due';
  let prefix = '📅';
  if (diff < 0) { cls += ' overdue'; prefix = '⚠️'; }
  else if (diff === 0) { cls += ' today'; prefix = '🔥'; }
  else if (diff <= 3) { cls += ' soon'; prefix = '⏰'; }
  return { cls, text: prefix + ' ' + label };
}

function renderList(listName) {
  const container = document.getElementById(listName + 'List');
  const tasks = data[listName];
  const countEl = document.getElementById(listName + 'Count');
  const active = tasks.filter(t => !t.done).length;
  countEl.textContent = `(${active}/${tasks.length})`;

  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty-list">Ei tehtäviä</div>';
    return;
  }

  container.innerHTML = '';
  tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = `task-item ${listName}-item${task.done ? ' done' : ''}`;
    item.dataset.id = task.id;

    const top = document.createElement('div');
    top.className = 'task-top';

    const check = document.createElement('button');
    check.className = 'check-btn';
    check.textContent = task.done ? '✓' : '';
    check.title = task.done ? 'Merkitse tekemättömäksi' : 'Merkitse tehdyksi';
    check.addEventListener('click', () => toggleDone(listName, task.id));

    const text = document.createElement('span');
    text.className = 'task-text';
    text.textContent = task.text;

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '×';
    del.title = 'Poista tehtävä';
    del.addEventListener('click', () => deleteTask(listName, task.id));

    top.appendChild(check);
    top.appendChild(text);
    item.appendChild(top);
    item.appendChild(del);

    // Meta row
    if (task.due) {
      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const d = formatDue(task.due, task);
      if (d) {
        const dueEl = document.createElement('span');
        dueEl.className = d.cls;
        dueEl.textContent = d.text;
        meta.appendChild(dueEl);
      }

      // Reminder info
      if (task.reminders && task.reminders.length > 0) {
        const remEl = document.createElement('span');
        remEl.className = 'task-due';
        remEl.style.color = 'var(--green)';
        const labels = task.reminders.map(m => {
          const o = REMINDER_OPTS.find(r => r.value === m);
          return o ? o.label : m + ' min';
        });
        remEl.textContent = '🔔 ' + labels.join(', ');
        meta.appendChild(remEl);
      }

      // Google Calendar button
      const calBtn = document.createElement('button');
      calBtn.className = 'cal-btn';
      calBtn.textContent = '📅 Lisää kalenteriin';
      calBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        addToGoogleCalendar(task);
      });
      meta.appendChild(calBtn);

      item.appendChild(meta);
    }

    container.appendChild(item);
  });
}

function render() {
  renderList('civil');
  renderList('work');
}

// ─── TASK ACTIONS ─────────────────────────────────────────────────────────────
function toggleDone(list, id) {
  const t = data[list].find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    t.doneAt = t.done ? Date.now() : null;
    save();
    render();
  }
}

function deleteTask(list, id) {
  data[list] = data[list].filter(t => t.id !== id);
  save();
  render();
}

function clearDone(list) {
  const count = data[list].filter(t => t.done).length;
  if (count === 0) { showToast('Ei valmiita tehtäviä poistettavaksi'); return; }
  data[list] = data[list].filter(t => !t.done);
  save();
  render();
  showToast(`🗑️ Poistettu ${count} valmis tehtävä${count > 1 ? 'ä' : ''}`);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isReminder = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isReminder ? ' reminder' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ─── DATE HEADER ─────────────────────────────────────────────────────────────
function updateDate() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    new Intl.DateTimeFormat('fi-FI', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).format(now);
}

// ─── GOOGLE CALENDAR ─────────────────────────────────────────────────────────
function addToGoogleCalendar(task) {
  if (!task.due) { showToast('Aseta ensin eräpäivä'); return; }

  // Parse date parts directly from string to avoid UTC timezone issues
  const [yyyy, mm, dd] = task.due.split('-');
  const pad = n => String(n).padStart(2, '0');

  let startDt, endDt;
  if (task.dueTime) {
    const [hh, mi] = task.dueTime.split(':');
    // Start: YYYYMMDDTHHmm00
    startDt = yyyy + mm + dd + 'T' + hh + mi + '00';
    // End: +30 minutes
    const totalMin = parseInt(hh) * 60 + parseInt(mi) + 30;
    const endH = pad(Math.floor(totalMin / 60) % 24);
    const endM = pad(totalMin % 60);
    // Handle day overflow
    let endDate = task.due;
    if (Math.floor(totalMin / 60) >= 24) {
      const d = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd) + 1);
      endDate = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate());
    } else {
      endDate = yyyy + mm + dd;
    }
    endDt = endDate + 'T' + endH + endM + '00';
  } else {
    // All-day: YYYYMMDD / next day YYYYMMDD
    startDt = yyyy + mm + dd;
    const next = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd) + 1);
    endDt = next.getFullYear() + pad(next.getMonth()+1) + pad(next.getDate());
  }

  // Build URL manually to avoid URLSearchParams encoding issues with Google Calendar
  const title = encodeURIComponent(task.text);
  const dates = startDt + '/' + endDt;
  const details = encodeURIComponent('Lisätty Todo-sovelluksesta');

  let url = 'https://calendar.google.com/calendar/r/eventedit'
    + '?action=TEMPLATE'
    + '&text=' + title
    + '&dates=' + dates
    + '&details=' + details;

  // Reminders in minutes
  if (task.reminders && task.reminders.length > 0) {
    task.reminders.forEach(m => { url += '&add=' + m; });
  }

  window.open(url, '_blank');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
updateDate();
render();

// Set min date for due date picker
document.getElementById('dueDateInput').min = new Date().toISOString().split('T')[0];
</script>
