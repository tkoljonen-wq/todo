<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Todo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #e8e4dc;
  --muted: #666;
  --work: #c8a96e;
  --civil: #6e9ec8;
  --done: #3a3a3a;
  --red: #c86e6e;
  --green: #6ec88a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  font-size: 14px;
}

header {
  padding: 1.5rem 2rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  letter-spacing: -0.02em;
}
header .date { color: var(--muted); font-size: 12px; }

.input-area {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.task-row { display: flex; gap: 0.75rem; align-items: flex-start; }
.task-text-wrap { flex: 1; }

#taskInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 0.7rem 0.9rem;
  border-radius: 4px;
  outline: none;
  resize: none;
  min-height: 44px;
  line-height: 1.5;
}
#taskInput:focus { border-color: var(--muted); }
#taskInput::placeholder { color: var(--muted); }
#taskInput.listening { border-color: var(--red); }

.mic-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  font-size: 20px;
  padding: 0 12px;
  min-height: 44px;
  min-width: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
  user-select: none;
  -webkit-user-select: none;
  transition: all 0.15s;
}
.mic-btn:hover { color: var(--text); border-color: var(--muted); }
.mic-btn.active { color: var(--red); border-color: var(--red); background: #2a1a1a; }

.meta-row {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 0.75rem;
}
.meta-row input[type="date"],
.meta-row input[type="time"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 0.5rem 0.7rem;
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
.meta-row input[type="date"]::-webkit-calendar-picker-indicator,
.meta-row input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

.save-btns { display: flex; gap: 0.6rem; margin-left: auto; }
.btn-civil, .btn-work {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 0.6rem 1.2rem;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  letter-spacing: 0.05em;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-civil { background: var(--civil); color: #0a1a2a; }
.btn-work  { background: var(--work);  color: #1a0e00; }
.btn-civil:hover, .btn-work:hover { opacity: 0.85; }
.btn-civil:active, .btn-work:active { transform: scale(0.97); }

.lists-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: calc(100vh - 220px);
}
@media (max-width: 600px) {
  .lists-container { grid-template-columns: 1fr; }
  .save-btns { margin-left: 0; width: 100%; }
  .btn-civil, .btn-work { flex: 1; }
}

.list-col { border-right: 1px solid var(--border); padding: 1.5rem; }
.list-col:last-child { border-right: none; }

.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
}
.list-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.list-title.civil { color: var(--civil); }
.list-title.work  { color: var(--work); }
.list-title .count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

.clear-done-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 0.3rem 0.6rem;
  border-radius: 3px;
  cursor: pointer;
}
.clear-done-btn:hover { color: var(--red); border-color: var(--red); }

.task-item {
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.8rem 1rem;
  margin-bottom: 0.5rem;
  background: var(--surface);
  position: relative;
  transition: opacity 0.2s;
}
.task-item.civil-item { border-left: 3px solid var(--civil); }
.task-item.work-item  { border-left: 3px solid var(--work); }
.task-item.done { opacity: 0.5; background: var(--done); }
.task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

.task-top { display: flex; align-items: flex-start; gap: 0.7rem; }

.check-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 20px; height: 20px; min-width: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: transparent;
  margin-top: 1px;
  transition: all 0.15s;
}
.task-item.done .check-btn { background: var(--green); border-color: var(--green); color: #0a1a0f; }
.check-btn:hover { border-color: var(--green); }

.task-text { flex: 1; line-height: 1.5; word-break: break-word; }

.task-meta {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 0.5rem;
  margin-left: 27px;
  flex-wrap: wrap;
}
.task-due { font-size: 11px; color: var(--muted); }
.task-due.overdue { color: var(--red); }
.task-due.today   { color: var(--work); }
.task-due.soon    { color: var(--work); }

.cal-btn {
  font-size: 11px;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 3px;
  padding: 2px 7px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.cal-btn:hover { border-color: #4285f4; color: #4285f4; }

.delete-btn {
  position: absolute;
  top: 0.6rem; right: 0.6rem;
  background: none; border: none;
  color: transparent; cursor: pointer;
  font-size: 14px; padding: 2px 5px;
  transition: color 0.15s;
}
.task-item:hover .delete-btn { color: var(--muted); }
.delete-btn:hover { color: var(--red) !important; }

.empty-list {
  color: var(--muted); font-size: 12px;
  text-align: center; padding: 2rem;
  border: 1px dashed var(--border); border-radius: 5px;
}

#toast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 0.75rem 1.5rem;
  border-radius: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
  z-index: 1000;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Todo</h1>
  <span class="date" id="headerDate"></span>
</header>

<div class="input-area">
  <div class="task-row">
    <div class="task-text-wrap">
      <textarea id="taskInput" rows="1" placeholder="Uusi tehtävä..."></textarea>
    </div>
    <button class="mic-btn" id="micBtn"
      onmousedown="startMic()"
      onmouseup="stopMic()"
      onmouseleave="stopMic()"
      ontouchstart="startMic(event)"
      ontouchend="stopMic()"
      ontouchcancel="stopMic()"
      title="Pidä pohjassa ja puhu">🎤</button>
  </div>
  <div class="meta-row">
    <input type="date" id="dueDateInput" title="Eräpäivä">
    <input type="time" id="dueTimeInput" title="Kellonaika">
    <div class="save-btns">
      <button class="btn-civil" id="saveCivilBtn">💙 Siviili</button>
      <button class="btn-work"  id="saveWorkBtn">🟡 Työ</button>
    </div>
  </div>
</div>

<div class="lists-container">
  <div class="list-col">
    <div class="list-header">
      <span class="list-title work">Työ <span class="count" id="workCount"></span></span>
      <button class="clear-done-btn" onclick="clearDone('work')">Poista valmiit</button>
    </div>
    <div id="workList"></div>
  </div>
  <div class="list-col">
    <div class="list-header">
      <span class="list-title civil">Siviili <span class="count" id="civilCount"></span></span>
      <button class="clear-done-btn" onclick="clearDone('civil')">Poista valmiit</button>
    </div>
    <div id="civilList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'todo_v2';
let data = { civil: [], work: [] };

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) data = JSON.parse(s);
    if (!data.civil) data.civil = [];
    if (!data.work)  data.work  = [];
  } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── TEXTAREA ──────────────────────────────────────────────────────────────────
const taskInput = document.getElementById('taskInput');
taskInput.addEventListener('input', () => {
  taskInput.style.height = 'auto';
  taskInput.style.height = taskInput.scrollHeight + 'px';
});
taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('dueDateInput').focus();
  }
});

// ── VOICE ─────────────────────────────────────────────────────────────────────
const micBtn = document.getElementById('micBtn');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let isListening = false;

function resetMicUI() {
  isListening = false;
  micBtn.classList.remove('active');
  taskInput.classList.remove('listening');
  micBtn.textContent = '🎤';
  taskInput.placeholder = 'Uusi tehtävä...';
}

function startMic(e) {
  if (e) e.preventDefault();
  if (isListening) return;
  if (!SR) { showToast('⚠️ Puheentunnistus vaatii Chrome-selaimen'); return; }
  taskInput.value = '';
  const rec = new SR();
  rec.lang = 'fi-FI';
  rec.interimResults = true;
  rec.continuous = false;
  rec.onstart = () => {
    isListening = true;
    micBtn.classList.add('active');
    taskInput.classList.add('listening');
    micBtn.textContent = '🔴';
    taskInput.placeholder = 'Kuuntelen...';
  };
  rec.onresult = e => {
    taskInput.value = Array.from(e.results).map(r => r[0].transcript).join('');
    taskInput.style.height = 'auto';
    taskInput.style.height = taskInput.scrollHeight + 'px';
  };
  rec.onerror = e => {
    if (e.error === 'not-allowed') showToast('⚠️ Mikrofoni estetty — salli lupa selaimen asetuksista');
    else if (e.error === 'no-speech') showToast('Ei puhetta havaittu');
    resetMicUI();
  };
  rec.onend = () => resetMicUI();
  rec.start();
}

function stopMic() { resetMicUI(); }

if (!SR) { micBtn.style.opacity = '0.3'; micBtn.style.cursor = 'not-allowed'; }

// ── SAVE ──────────────────────────────────────────────────────────────────────
document.getElementById('saveCivilBtn').addEventListener('click', () => saveTask('civil'));
document.getElementById('saveWorkBtn').addEventListener('click',  () => saveTask('work'));

function saveTask(list) {
  const text = taskInput.value.trim();
  if (!text) { taskInput.focus(); showToast('Kirjoita ensin tehtävä!'); return; }
  data[list].unshift({
    id:      Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    text,
    due:     document.getElementById('dueDateInput').value,
    dueTime: document.getElementById('dueTimeInput').value,
    done:    false,
    created: Date.now(),
  });
  save(); render(); resetForm(); taskInput.focus();
  showToast(list === 'civil' ? '💙 Lisätty siviililistalle' : '🟡 Lisätty työlistalle');
}

function resetForm() {
  taskInput.value = '';
  taskInput.style.height = 'auto';
  document.getElementById('dueDateInput').value = '';
  document.getElementById('dueTimeInput').value = '';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function formatDue(task) {
  if (!task.due) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,m,d] = task.due.split('-').map(Number);
  const due = new Date(y, m-1, d);
  const diff = Math.round((due - today) / 86400000);
  const label = due.toLocaleDateString('fi-FI') + (task.dueTime ? ' klo ' + task.dueTime : '');
  let cls = 'task-due', icon = '📅';
  if (diff < 0)       { cls += ' overdue'; icon = '⚠️'; }
  else if (diff === 0) { cls += ' today';   icon = '🔥'; }
  else if (diff <= 3)  { cls += ' soon';    icon = '⏰'; }
  return { cls, text: icon + ' ' + label };
}

function renderList(name) {
  const container = document.getElementById(name + 'List');
  const tasks = data[name];
  document.getElementById(name + 'Count').textContent =
    '(' + tasks.filter(t => !t.done).length + '/' + tasks.length + ')';

  if (!tasks.length) {
    container.innerHTML = '<div class="empty-list">Ei tehtäviä</div>';
    return;
  }
  container.innerHTML = '';

  tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-item ' + name + '-item' + (task.done ? ' done' : '');

    const top = document.createElement('div');
    top.className = 'task-top';

    const check = document.createElement('button');
    check.className = 'check-btn';
    check.textContent = task.done ? '✓' : '';
    check.addEventListener('click', () => toggleDone(name, task.id));

    const textEl = document.createElement('span');
    textEl.className = 'task-text';
    textEl.textContent = task.text;

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '×';
    del.addEventListener('click', () => deleteTask(name, task.id));

    top.appendChild(check);
    top.appendChild(textEl);
    item.appendChild(top);
    item.appendChild(del);

    if (task.due) {
      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const d = formatDue(task);
      if (d) {
        const dueEl = document.createElement('span');
        dueEl.className = d.cls;
        dueEl.textContent = d.text;
        meta.appendChild(dueEl);
      }

      const calBtn = document.createElement('button');
      calBtn.className = 'cal-btn';
      calBtn.textContent = '📅 Kalenteriin';
      calBtn.addEventListener('click', e => { e.stopPropagation(); addToGoogleCalendar(task); });
      meta.appendChild(calBtn);
      item.appendChild(meta);
    }

    container.appendChild(item);
  });
}

function render() { renderList('civil'); renderList('work'); }

// ── TASK ACTIONS ──────────────────────────────────────────────────────────────
function toggleDone(list, id) {
  const t = data[list].find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
function deleteTask(list, id) {
  data[list] = data[list].filter(t => t.id !== id);
  save(); render();
}
function clearDone(list) {
  const n = data[list].filter(t => t.done).length;
  if (!n) { showToast('Ei valmiita tehtäviä'); return; }
  data[list] = data[list].filter(t => !t.done);
  save(); render();
  showToast('🗑️ Poistettu ' + n + ' tehtävä' + (n > 1 ? 'ä' : ''));
}

// ── GOOGLE CALENDAR ───────────────────────────────────────────────────────────
function addToGoogleCalendar(task) {
  const [yyyy, mm, dd] = task.due.split('-');
  const pad = n => String(n).padStart(2, '0');
  let dates;
  if (task.dueTime) {
    const [hh, mi] = task.dueTime.split(':');
    const startDt = yyyy + mm + dd + 'T' + hh + mi + '00';
    const total = parseInt(hh) * 60 + parseInt(mi) + 30;
    dates = startDt + '/' + yyyy + mm + dd + 'T' + pad(Math.floor(total/60)%24) + pad(total%60) + '00';
  } else {
    const next = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd)+1);
    dates = yyyy+mm+dd + '/' + next.getFullYear()+pad(next.getMonth()+1)+pad(next.getDate());
  }
  const url = 'https://www.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(task.text)
    + '&dates=' + dates;

  // Open in new tab so Todo stays open
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
document.getElementById('headerDate').textContent =
  new Intl.DateTimeFormat('fi-FI', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).format(new Date());
document.getElementById('dueDateInput').min = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
