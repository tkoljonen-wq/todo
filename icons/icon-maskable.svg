<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background, no padding — maskable safe zone is center 80% (approx 205-307) -->
  <rect width="512" height="512" fill="#0f0f0f"/>
  <rect x="30" y="30" width="452" height="452" rx="32" fill="#1a1a1a"/>
  <!-- List lines -->
  <rect x="168" y="164" width="196" height="20" rx="10" fill="#e8e4dc" opacity="0.15"/>
  <rect x="168" y="214" width="156" height="20" rx="10" fill="#e8e4dc" opacity="0.15"/>
  <rect x="168" y="278" width="196" height="20" rx="10" fill="#e8e4dc" opacity="0.15"/>
  <rect x="168" y="328" width="116" height="20" rx="10" fill="#e8e4dc" opacity="0.15"/>
  <!-- Check - work color (outline) -->
  <circle cx="128" cy="174" r="24" fill="none" stroke="#c8a96e" stroke-width="6"/>
  <path d="M113 174 l9 9 l19 -19" stroke="#c8a96e" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check - civil color (filled) -->
  <circle cx="128" cy="288" r="24" fill="#6e9ec8"/>
  <path d="M113 288 l9 9 l19 -19" stroke="#0a1a2a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
